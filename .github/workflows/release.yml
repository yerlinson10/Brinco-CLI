name: Release Packages and Installers

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  goreleaser:
    name: Build and publish packages
    runs-on: ubuntu-latest
    environment: main
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run GoReleaser
        if: github.event_name == 'release'
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: ~> v2
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SCOOP_BUCKET_GITHUB_TOKEN: ${{ secrets.SCOOP_BUCKET_GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      - name: Run GoReleaser snapshot (manual)
        if: github.event_name != 'release'
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: ~> v2
          args: release --clean --snapshot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  windows-installer:
    name: Build Windows installer exe
    runs-on: windows-latest
    needs: goreleaser
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build Windows executable
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path dist/windows-installer | Out-Null
          $env:GOOS = "windows"
          $env:GOARCH = "amd64"
          $env:CGO_ENABLED = "0"
          go build -trimpath -ldflags "-s -w" -o dist/windows-installer/brinco.exe ./cmd/brinco

      - name: Build installer with Inno Setup
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.6
        with:
          path: packaging/windows/brinco.iss
        env:
          BRINCO_VERSION: ${{ github.ref_name }}

      - name: List installer outputs
        shell: powershell
        run: |
          Write-Host "Listing installer outputs..."
          if (Test-Path "packaging/windows/Output") { Get-ChildItem -Recurse "packaging/windows/Output" }
          if (Test-Path "Output") { Get-ChildItem -Recurse "Output" }

      - name: Upload installer to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            packaging/windows/Output/Brinco-Setup-*.exe
            Output/Brinco-Setup-*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer artifact (manual)
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: brinco-windows-installer
          path: |
            packaging/windows/Output/Brinco-Setup-*.exe
            Output/Brinco-Setup-*.exe
