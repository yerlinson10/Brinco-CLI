version: 2

project_name: brinco

before:
  hooks:
    - go mod tidy

builds:
  - id: brinco
    main: ./cmd/brinco
    binary: brinco
    env:
      - CGO_ENABLED=0
    goos:
      - windows
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: brinco_archives
    builds:
      - brinco
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md

checksum:
  name_template: checksums.txt

release:
  github:
    owner: yerlinson10
    name: Brinco-CLI

nfpms:
  - id: brinco_linux_packages
    package_name: brinco
    homepage: https://github.com/yerlinson10/Brinco-CLI
    description: Chat CLI P2P en Go con salas y codigos de invitacion
    maintainer: Yerlinson <noreply@github.com>
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/local/bin

scoops:
  - name: brinco
    repository:
      owner: yerlinson10
      name: scoop-bucket
      token: "{{ .Env.SCOOP_BUCKET_GITHUB_TOKEN }}"
      branch: main
    homepage: https://github.com/yerlinson10/Brinco-CLI
    description: Chat CLI P2P en Go con salas y codigos de invitacion
    commit_author:
      name: brinco-bot
      email: actions@github.com

brews:
  - name: brinco
    homepage: https://github.com/yerlinson10/Brinco-CLI
    description: Chat CLI P2P en Go con salas y codigos de invitacion
    license: MIT
    test: |
      system "#{bin}/brinco", "version"
    repository:
      owner: yerlinson10
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_author:
      name: brinco-bot
      email: actions@github.com

