name: Build and Publish Binaries

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            ext: .exe
          - goos: windows
            goarch: arm64
            ext: .exe
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "" ]; then
            VERSION="dev"
          fi
          OUT="dist/brinco-${VERSION}-${GOOS}-${GOARCH}${{ matrix.ext }}"
          go build -trimpath -ldflags "-s -w" -o "$OUT" ./cmd/brinco

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: brinco-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

      - name: Upload release asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
